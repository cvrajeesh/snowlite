name: Release Binaries

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  # Resolve the release tag from the commit that triggered the Release workflow.
  # release-plz uses GITHUB_TOKEN to create releases, which suppresses the
  # `release: published` event. Using `workflow_run` sidesteps this limitation.
  resolve-tag:
    name: Resolve release tag
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Find tag at release commit
        id: tag
        run: |
          TAG=$(git tag --points-at ${{ github.event.workflow_run.head_sha }} \
            | grep '^v' | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: resolve-tag
    if: ${{ needs.resolve-tag.outputs.tag != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            artifact: snowlite-server-linux-x86_64
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            artifact: snowlite-server-linux-aarch64
            cross_linker: aarch64-linux-gnu-gcc
            cross_pkg: gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: matrix.cross_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cross_linker }}
        run: |
          cargo build --release --features server --bin snowlite-server --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/snowlite-server ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: ${{ matrix.artifact }}

  build-macos-universal:
    name: macOS Universal
    runs-on: macos-latest
    needs: resolve-tag
    if: ${{ needs.resolve-tag.outputs.tag != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --features server --bin snowlite-server --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --features server --bin snowlite-server --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/snowlite-server \
            target/aarch64-apple-darwin/release/snowlite-server \
            -output snowlite-server-macos-universal

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: snowlite-server-macos-universal

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: resolve-tag
    if: ${{ needs.resolve-tag.outputs.tag != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: |
          cargo build --release --features server --bin snowlite-server --target x86_64-pc-windows-msvc
          copy target\x86_64-pc-windows-msvc\release\snowlite-server.exe snowlite-server-windows-x86_64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: snowlite-server-windows-x86_64.exe
