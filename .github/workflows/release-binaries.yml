name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            artifact: local-db-server-linux-x86_64
          - arch: aarch64
            target: aarch64-unknown-linux-gnu
            artifact: local-db-server-linux-aarch64
            cross_linker: aarch64-linux-gnu-gcc
            cross_pkg: gcc-aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: matrix.cross_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cross_linker }}
        run: |
          cargo build --release --features server --bin local-db-server --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/local-db-server ${{ matrix.artifact }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  build-macos-universal:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --features server --bin local-db-server --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --features server --bin local-db-server --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/local-db-server \
            target/aarch64-apple-darwin/release/local-db-server \
            -output local-db-server-macos-universal

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: local-db-server-macos-universal

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: |
          cargo build --release --features server --bin local-db-server --target x86_64-pc-windows-msvc
          copy target\x86_64-pc-windows-msvc\release\local-db-server.exe local-db-server-windows-x86_64.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: local-db-server-windows-x86_64.exe
