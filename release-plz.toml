[workspace]
# git_only = true: use git tags (e.g. v0.2.0) as the version baseline.
# Without this, release-plz queries crates.io to determine the current
# version. Since snowlite is not published to crates.io, the registry
# returns nothing and release-plz silently skips the package entirely.
# publish = false prevents release-plz from running `cargo publish`.
git_only = true
publish = false
git_release_enable = true
semver_check = false
